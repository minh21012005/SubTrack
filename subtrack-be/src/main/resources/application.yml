spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/subtrack}
    username: ${DB_USERNAME:subtrack}
    password: ${DB_PASSWORD:subtrack123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:subtrack-super-secret-key-that-is-at-least-256-bits-long-for-hs512}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  free-subscription-limit: ${APP_FREE_LIMIT:5}
  reminder:
    cron: "0 0 8 * * *"
  cors:
    allowed-origins: "http://localhost:3000,http://subtrack-fe:3000"

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.subtrack: DEBUG
    org.flywaydb: INFO
